<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <title>HTML Form</title>
</head>

<body class="d-flex justify-content-center">
    <div class="card d-flex" style="width: 1200px;">
        <div class="card text-center">
            <div class="card-header d-flex">
                <h1>Payment form example</h1>
            </div>
            <div class="card-body">
                <div class="alert alert-danger d-flex" role="alert">
                    Some fields are missing
                </div>

                <div class="row">
                    <div class="col-5">
                        <p class="d-flex">Card #</p>
                        <input type="number" class="form-control" placeholder="XXXXXXXXXX">
                    </div>
                    <div class="col-3">
                        <p class="d-flex">CVC #</p>
                        <input type="number" class="form-control" placeholder="0000">
                    </div>
                    <div class="col-4">
                        <p class="d-flex">Amount</p>
                        <div class="input-group mb-3">
                            <span class="input-group-text">$</span>
                            <input type="text" class="form-control" placeholder="Amount"
                                aria-label="Dollar amount (with dot and two decimal places)">
                        </div>
                    </div>
                </div>
                <div class="row d-flex">
                    <div class="col-6">
                        <p class="d-flex mb-2">First name</p>
                        <input type="text" class="form-control" placeholder="First name" aria-label="First name">
                    </div>
                    <div class="col-6">
                        <p class="d-flex mb-2">Last name</p>
                        <input type="text" class="form-control" placeholder="Last name" aria-label="Last name">
                    </div>
                </div>
                <div class="row">
                    <div class="col-6">
                        <p class="d-flex mt-3 mb-2">City</p>
                        <input type="text" class="form-control">
                    </div>
                    <div class="col-3">
                        <p class="d-flex mt-3 mb-2">State</p>
                        <select id="inputState" class="form-select">
                            <option selected>Pick a state</option>
                            <option>...</option>
                        </select>
                    </div>
                    <div class="col-3">
                        <p class="d-flex mt-3 mb-2">Postal Code</p>
                        <input type="number" class="form-control">
                    </div>
                </div>
                <div class="row d-flex">
                    <div class="col-6 d-flex">
                        <div class="col-4">
                            <p class="d-flex mt-2 mb-2">We accept:</p>
                            <div class="d-flex bg-secondary">
                                <div class="form-check d-flex">
                                    <input class="form-check-input" type="radio" name="exampleRadios"
                                        id="exampleRadios1" value="option1" checked>
                                    <label class="form-check-label" for="exampleRadios1">
                                        <i class="fa-brands fa-cc-mastercard"></i>
                                    </label>
                                </div>
                                <div class="form-check d-flex">
                                    <input class="form-check-input" type="radio" name="exampleRadios"
                                        id="exampleRadios2" value="option2">
                                    <label class="form-check-label" for="exampleRadios2">
                                        <i class="fa-brands fa-cc-visa"></i>
                                    </label>
                                </div>
                                <div class="form-check d-flex">
                                    <input class="form-check-input" type="radio" name="exampleRadios"
                                        id="exampleRadios2" value="option2">
                                    <label class="form-check-label" for="exampleRadios2">
                                        <i class="fa-brands fa-cc-diners-club"></i>
                                    </label>
                                    <div class="form-check d-flex">
                                        <input class="form-check-input" type="radio" name="exampleRadios"
                                            id="exampleRadios2" value="option2">
                                        <label class="form-check-label" for="exampleRadios2">
                                            <i class="fa-brands fa-cc-amex"></i>
                                        </label>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-6">
                        <p class="d-flex mt-2 mb-2">Message</p>
                        <div class="form-floating">
                            <textarea class="form-control mb-2" placeholder="Leave a comment here"
                                id="floatingTextarea2" style="height: 100px"></textarea>
                            <label for="floatingTextarea2"></label>
                            <p class="d-flex text-secondary">Add any notes here.</p>
                        </div>
                    </div>
                </div>


            </div>
            <div class="card-footer text-body-secondary d-flex justify-content-end">
                <a href="#" class="btn btn-secondary d-flex border">Cancel</a>
                <a href="#" class="btn btn-primary d-flex border">Send</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"
        integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js"
        integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF"
        crossorigin="anonymous"></script>
    <script src="https://kit.fontawesome.com/f293b92212.js" crossorigin="anonymous"></script>
</body>

</html>
